# HTTP → HTTPS (rumble only — do not use default_server; selfistar shares this VPS)
server {
    listen 80;
    listen [::]:80;
    server_name rumble.globalonegaming.com www.rumble.globalonegaming.com;
    return 301 https://rumble.globalonegaming.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rumble.globalonegaming.com;

    ssl_certificate /etc/letsencrypt/live/rumble.globalonegaming.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rumble.globalonegaming.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://rumble.globalonegaming.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rumble.globalonegaming.com;

    ssl_certificate /etc/letsencrypt/live/rumble.globalonegaming.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rumble.globalonegaming.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/vasnumero/rumble_Gaming_IQA/dist;
    index index.html;

    location /api/rubycom/ {
        proxy_pass http://192.241.128.45/rubycom/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.241.128.45;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_redirect http://192.241.128.45/rubycom/ /api/rubycom/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
