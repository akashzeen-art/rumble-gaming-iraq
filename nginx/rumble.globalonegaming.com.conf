server {
    listen 80;
    listen [::]:80;
    server_name rumble.globalonegaming.com;

    root /var/www/vasnumero/rumble_Gaming_IQA/dist;
    index index.html;

    # Cloudflare passes visitor IP
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Proxy rubycom subscription APIs (avoids browser CORS issues)
    location /api/rubycom/ {
        proxy_pass http://192.241.128.45/rubycom/;
        proxy_http_version 1.1;
        proxy_set_header Host 192.241.128.45;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    # React SPA – all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
